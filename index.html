<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>GPS Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --accent: #4ade80; --accent-dim: #166534;
      --danger: #f87171; --danger-dim: #7f1d1d;
      --warn: #fbbf24; --blue: #60a5fa; --blue-dim: #1e3a5f;
      --text: #e2e8f0; --muted: #64748b; --radius: 12px;
    }
    html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Login ── */
    #login-screen {
      position: fixed; inset: 0; z-index: 2000; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px; gap: 32px;
    }
    #login-screen.hidden { display: none; }
    .login-logo  { font-size: 2.5rem; }
    .login-title { font-size: 1.4rem; font-weight: 800; letter-spacing: .04em; }
    .login-sub   { font-size: .85rem; color: var(--muted); }
    #user-grid   { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; width: 100%; max-width: 400px; }
    .user-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: var(--radius); padding: 20px 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background .15s, border-color .15s, transform .1s;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .user-btn:active { transform: scale(.96); }
    .user-btn:hover  { background: #22263a; border-color: var(--accent); }
    .user-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent-dim); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 800;
    }

    /* ── App ── */
    #app { display: flex; flex-direction: column; height: 100dvh; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 8px;
    }
    .header-left  { display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    header h1 { font-size: 1rem; font-weight: 700; letter-spacing: .04em; }
    #user-badge { font-size: .75rem; font-weight: 600; background: var(--accent-dim); color: var(--accent); padding: 3px 10px; border-radius: 99px; }
    #btn-logout { font-size: .7rem; padding: 4px 10px; border-radius: 99px; background: var(--border); color: var(--muted); border: none; cursor: pointer; }
    #status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background .3s; }
    #status-dot.recording { background: var(--danger); animation: pulse 1.2s infinite; }
    #status-dot.paused    { background: var(--warn); }
    #status-dot.ready     { background: var(--accent); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    #gps-badge { font-size: .65rem; padding: 2px 7px; border-radius: 99px; background: var(--border); color: var(--muted); letter-spacing: .04em; }
    #gps-badge.good { background: var(--accent-dim); color: var(--accent); }

    /* ── Map ── */
    #map-wrap { flex: 1; min-height: 0; position: relative; }
    #map { width: 100%; height: 100%; }
    .maplibregl-ctrl-bottom-left { bottom: 4px !important; }

    /* Map button group */
    #map-btns {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      display: flex; flex-direction: column; gap: 6px;
    }
    .map-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 7px 12px; font-size: .75rem; font-weight: 700;
      cursor: pointer; letter-spacing: .04em; box-shadow: 0 2px 8px rgba(0,0,0,.4);
      transition: background .15s, border-color .15s; white-space: nowrap;
    }
    .map-btn.active        { background: var(--blue-dim);   border-color: var(--blue);   color: var(--blue); }
    .map-btn.active-accent { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* Search panel */
    #search-panel {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 12px; display: none; flex-direction: column;
    }
    #search-panel.open { display: flex; }
    #search-input-row { display: flex; gap: 8px; }
    #search-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .9rem;
      padding: 9px 12px; outline: none; font-family: inherit;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-close {
      background: var(--border); color: var(--muted); border: none;
      border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: .85rem; font-weight: 600;
    }
    #search-results { display: none; flex-direction: column; margin-top: 8px; gap: 2px; max-height: 180px; overflow-y: auto; }
    #search-results.show { display: flex; }
    .search-result { padding: 9px 12px; border-radius: 6px; cursor: pointer; font-size: .82rem; color: var(--text); transition: background .15s; }
    .search-result:active { background: var(--bg); }
    .sr-name { font-weight: 700; }
    .sr-sub  { color: var(--muted); font-size: .72rem; margin-top: 1px; }

    /* Markers */
    .pos-dot {
      width: 18px; height: 18px; border-radius: 50%;
      background: #4ade80; border: 3px solid #fff; box-shadow: 0 0 6px rgba(0,0,0,.5);
    }
    .search-pin {
      width: 14px; height: 14px; border-radius: 50%;
      background: #f87171; border: 2px solid #fff; box-shadow: 0 0 4px rgba(0,0,0,.5);
    }

    /* ── Stats ── */
    #stats { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
    .stat { display: flex; flex-direction: column; align-items: center; padding: 10px 4px; border-right: 1px solid var(--border); }
    .stat:last-child { border-right: none; }
    .stat-val { font-size: 1.1rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat-lbl { font-size: .6rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

    /* ── Controls ── */
    #controls { display: flex; gap: 8px; padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
    button { flex: 1; border: none; border-radius: var(--radius); padding: 14px 8px; font-size: .85rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; letter-spacing: .03em; }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .35; cursor: not-allowed; }
    #btn-start  { background: var(--accent); color: #052e16; }
    #btn-pause  { background: var(--warn); color: #451a03; }
    #btn-stop   { background: var(--danger); color: #450a0a; }
    #btn-export { background: var(--border); color: var(--text); }
    #btn-import { background: var(--border); color: var(--text); flex: 0 0 auto; padding: 14px 12px; font-size: 1rem; }
    #btn-center { background: var(--border); color: var(--text); flex: 0 0 48px; font-size: 1.1rem; padding: 14px 0; }
    #tracks-btn { background: var(--border); color: var(--text); }
    #tracks-btn .count { background: var(--accent); color: #052e16; border-radius: 99px; padding: 1px 6px; font-size: .65rem; }

    /* ── Overlays ── */
    .overlay { display: none; position: fixed; inset: 0; z-index: 900; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); align-items: flex-end; }
    .overlay.open { display: flex; }

    /* ── Tracks list ── */
    #panel { width: 100%; max-height: 80dvh; background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; border-top: 1px solid var(--border); display: flex; flex-direction: column; }
    #panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #panel-header h2 { font-size: .95rem; }
    #panel-header-btns { display: flex; gap: 8px; align-items: center; }
    #panel-map-btn { background: var(--blue-dim); color: var(--blue); flex: 0 0 auto; padding: 6px 10px; font-size: .72rem; border-radius: 8px; }
    #panel-map-btn.active { background: var(--accent-dim); color: var(--accent); }
    #panel-close  { background: var(--border); color: var(--text); flex: 0 0 auto; padding: 6px 14px; font-size: .8rem; }

    /* Aggregate stats */
    #panel-agg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .agg-stat { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
    .agg-val { font-size: 1rem; font-weight: 700; }
    .agg-lbl { font-size: .6rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }

    #tracks-list { overflow-y: auto; padding: 8px; flex: 1; }
    .track-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 6px; background: var(--bg); cursor: pointer; transition: border-color .15s; }
    .track-item:active { border-color: var(--accent); }
    .track-info { flex: 1; min-width: 0; }
    .track-title   { font-size: .9rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-summary { font-size: .72rem; color: var(--muted); margin-top: 3px; }
    .track-chevron { color: var(--muted); font-size: .9rem; flex-shrink: 0; }
    .track-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .track-actions button { flex: 0 0 auto; padding: 7px 10px; font-size: .7rem; }
    .btn-dl    { background: var(--accent-dim); color: var(--accent); }
    .btn-rm    { background: var(--danger-dim); color: var(--danger); }
    .btn-share { background: var(--blue-dim); color: var(--blue); }
    .empty-msg { color: var(--muted); font-size: .85rem; text-align: center; padding: 32px 16px; }

    /* ── Detail panel ── */
    #detail-overlay { display: none; position: fixed; inset: 0; z-index: 950; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); align-items: flex-end; }
    #detail-overlay.open { display: flex; }
    #detail-panel { width: 100%; max-height: 90dvh; background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; border-top: 1px solid var(--border); display: flex; flex-direction: column; }
    #detail-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0; }
    #detail-header-text { flex: 1; min-width: 0; }
    #detail-track-title { font-size: 1.05rem; font-weight: 800; }
    #detail-track-meta  { font-size: .72rem; color: var(--muted); margin-top: 3px; }
    #detail-close { background: var(--border); color: var(--text); flex: 0 0 auto; padding: 6px 14px; font-size: .8rem; }
    #detail-body { overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 20px; flex: 1; }
    .detail-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .detail-stat { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; }
    .detail-stat-val { font-size: 1.4rem; font-weight: 800; font-variant-numeric: tabular-nums; }
    .detail-stat-lbl { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .detail-stat.accent .detail-stat-val { color: var(--accent); }
    .detail-stat.blue   .detail-stat-val { color: var(--blue); }
    .detail-stat.warn   .detail-stat-val { color: var(--warn); }
    .detail-stat.danger .detail-stat-val { color: var(--danger); }
    .section-title { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    .alt-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .alt-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; text-align: center; }
    .alt-card-val { font-size: 1.1rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .alt-card-lbl { font-size: .6rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }
    .alt-card.start .alt-card-val { color: var(--accent); }
    .alt-card.peak  .alt-card-val { color: var(--warn); }
    .alt-card.end   .alt-card-val { color: var(--blue); }
    .chart-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
    .detail-actions { display: flex; gap: 10px; padding-bottom: 4px; }
    .detail-actions button { font-size: .85rem; padding: 13px 8px; }
    .btn-detail-map   { background: var(--border); color: var(--text); }
    .btn-detail-share { background: var(--blue-dim); color: var(--blue); }
    .btn-detail-dl    { background: var(--accent-dim); color: var(--accent); }
    .btn-detail-rm    { background: var(--danger-dim); color: var(--danger); flex: 0 0 48px; }

    /* ── Save dialog ── */
    #save-overlay { display: none; position: fixed; inset: 0; z-index: 960; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 20px; }
    #save-overlay.open { display: flex; }
    #save-card { width: 100%; max-width: 420px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    #save-card h2 { font-size: 1rem; font-weight: 700; }
    #save-card h2 span { color: var(--muted); font-weight: 400; font-size: .8rem; margin-left: 6px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .field input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .95rem; padding: 11px 13px; outline: none; transition: border-color .15s; font-family: inherit; }
    .field input:focus     { border-color: var(--accent); }
    .field input[readonly] { color: var(--muted); cursor: default; }
    .save-actions { display: flex; gap: 10px; margin-top: 4px; }
    #btn-save-confirm { background: var(--accent); color: #052e16; }
    #btn-save-discard { background: var(--border); color: var(--muted); flex: 0 0 auto; padding: 14px 18px; }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 99px; font-size: .8rem; z-index: 1100; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-logo">📍</div>
  <div style="text-align:center">
    <div class="login-title">GPS Tracker</div>
    <div class="login-sub" style="margin-top:6px">Chi sei?</div>
  </div>
  <div id="user-grid"></div>
</div>

<!-- ── App ── -->
<div id="app">
  <header>
    <div class="header-left">
      <div id="status-dot"></div>
      <h1>GPS Tracker</h1>
      <div id="user-badge"></div>
    </div>
    <div class="header-right">
      <div id="gps-badge">GPS —</div>
      <button id="btn-logout">Esci</button>
    </div>
  </header>

  <div id="map-wrap">
    <div id="map"></div>

    <div id="map-btns">
      <button class="map-btn" id="btn-search">🔍 Cerca</button>
      <button class="map-btn" id="btn-trails">Sentieri</button>
      <button class="map-btn" id="btn-3d">3D</button>
    </div>

    <div id="search-panel">
      <div id="search-input-row">
        <input id="search-input" type="search" placeholder="Cerca luoghi, sentieri, vette…" autocomplete="off" autocorrect="off" />
        <button id="search-close">✕</button>
      </div>
      <div id="search-results"></div>
    </div>
  </div>

  <div id="stats">
    <div class="stat"><span class="stat-val" id="s-dist">0.00</span><span class="stat-lbl">km</span></div>
    <div class="stat"><span class="stat-val" id="s-time">00:00</span><span class="stat-lbl">durata</span></div>
    <div class="stat"><span class="stat-val" id="s-speed">0.0</span><span class="stat-lbl">km/h</span></div>
    <div class="stat"><span class="stat-val" id="s-pts">0</span><span class="stat-lbl">punti</span></div>
  </div>

  <div id="controls">
    <button id="btn-start">▶ Avvia</button>
    <button id="btn-pause" style="display:none">⏸ Pausa</button>
    <button id="btn-stop"  style="display:none">⏹ Stop</button>
    <button id="btn-export" disabled>↓ GPX</button>
    <button id="btn-import" title="Importa GPX">📂</button>
    <button id="tracks-btn">Tracce <span class="count" id="tracks-count">0</span></button>
    <button id="btn-center" title="Centra mappa">⊕</button>
    <input id="gpx-file-input" type="file" accept=".gpx,application/gpx+xml" style="display:none" />
  </div>
</div>

<!-- ── Tracks list ── -->
<div id="overlay" class="overlay">
  <div id="panel">
    <div id="panel-header">
      <h2 id="panel-title">Le mie tracce</h2>
      <div id="panel-header-btns">
        <button id="panel-map-btn">🗺 Mappa</button>
        <button id="panel-close">Chiudi</button>
      </div>
    </div>
    <div id="panel-agg"></div>
    <div id="tracks-list"></div>
  </div>
</div>

<!-- ── Track detail ── -->
<div id="detail-overlay">
  <div id="detail-panel">
    <div id="detail-header">
      <div id="detail-header-text">
        <div id="detail-track-title"></div>
        <div id="detail-track-meta"></div>
      </div>
      <button id="detail-close">Chiudi</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- ── Save dialog ── -->
<div id="save-overlay" class="overlay" style="align-items:center;justify-content:center">
  <div id="save-card">
    <h2>Salva traccia <span id="save-stats-hint"></span></h2>
    <div class="field">
      <label>Titolo</label>
      <input id="inp-title" type="text" placeholder="Es. Giro del lago" autocomplete="off" />
    </div>
    <div class="field">
      <label>Autore</label>
      <input id="inp-author" type="text" readonly />
    </div>
    <div class="save-actions">
      <button id="btn-save-confirm">Salva</button>
      <button id="btn-save-discard">Scarta</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
// ── Users ──────────────────────────────────────────────────────────────────
const USERS = ['Marco', 'Stefano', 'Davide', 'Alessandra'];

// ── Map setup ──────────────────────────────────────────────────────────────
const mapStyle = {
  version: 8,
  sources: {
    carto: {
      type: 'raster',
      tiles: [
        'https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',
        'https://b.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',
        'https://c.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',
        'https://d.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png'
      ],
      tileSize: 256,
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/attributions">CARTO</a>'
    }
  },
  layers: [{ id: 'carto-raster', type: 'raster', source: 'carto' }]
};

const map = new maplibregl.Map({
  container: 'map', style: mapStyle,
  center: [8.9, 44.4], // Genova / Liguria
  zoom: 9,
  pitchWithRotate: true, touchPitch: true
});

map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-left');
map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-left');

let mapLoaded = false, posMarker = null, searchMarker = null;
let ghostCount = 0, ghostIds = [];
let autoGhostCounter = 0, autoGhostIds = [];
let is3D = false, isTrails = false, showingAllTracks = false;

map.on('load', () => {
  mapLoaded = true;

  map.addLayer({ id: 'sky', type: 'sky', paint: {
    'sky-type': 'atmosphere', 'sky-atmosphere-sun': [0, 60], 'sky-atmosphere-sun-intensity': 10
  }});

  // Waymarked Trails – sentieri CAI e hiking da OpenStreetMap
  map.addSource('trails-src', {
    type: 'raster',
    tiles: ['https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png'],
    tileSize: 256, maxzoom: 17,
    attribution: '© <a href="https://hiking.waymarkedtrails.org">Waymarked Trails</a>'
  });
  map.addLayer({
    id: 'trails-layer', type: 'raster', source: 'trails-src',
    layout: { visibility: 'none' },
    paint: { 'raster-opacity': 0.85 }
  });

  // Traccia corrente
  map.addSource('track', {
    type: 'geojson',
    data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [] } }
  });
  map.addLayer({
    id: 'track-layer', type: 'line', source: 'track',

// ── Search ─────────────────────────────────────────────────────────────────
const btnSearch     = document.getElementById('btn-search');
const searchPanel   = document.getElementById('search-panel');
const searchInput   = document.getElementById('search-input');
const searchClose   = document.getElementById('search-close');
const searchResults = document.getElementById('search-results');
let searchTimer, searchAbort;

btnSearch.addEventListener('click', () => {
  searchPanel.classList.add('open');
  searchInput.focus();
});

searchClose.addEventListener('click', closeSearch);
function closeSearch() {
  searchPanel.classList.remove('open');
  searchInput.value = '';
  searchResults.innerHTML = '';
  searchResults.classList.remove('show');
  if (searchMarker) { searchMarker.remove(); searchMarker = null; }
}

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (q.length < 2) { searchResults.innerHTML = ''; searchResults.classList.remove('show'); return; }
  searchTimer = setTimeout(() => doSearch(q), 500);
});

searchInput.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });

async function doSearch(q) {
  if (searchAbort) searchAbort.abort();
  searchAbort = new AbortController();
  try {
    const params = new URLSearchParams({
      q, format: 'json', limit: '6', 'accept-language': 'it',
      viewbox: '6.6,45.1,10.6,43.8', bounded: '0', addressdetails: '1'
    });
    const r = await fetch(`https://nominatim.openstreetmap.org/search?${params}`, {
      headers: { 'Accept': 'application/json' },
      signal: searchAbort.signal
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    renderSearchResults(data);
  } catch(err) {
    if (err.name === 'AbortError') return;
    toast('Errore ricerca: ' + err.message);
  }
}

function renderSearchResults(results) {
  if (!results.length) {
    searchResults.innerHTML = '<div class="search-result"><span class="sr-name" style="color:var(--muted)">Nessun risultato</span></div>';
    searchResults.classList.add('show');
    return;
  }
  searchResults.innerHTML = results.map((r, i) => {
    const name  = r.name || r.display_name.split(',')[0].trim();
    const parts = r.display_name.split(',').slice(1, 3).join(',').trim();
    return `<div class="search-result" data-i="${i}">
      <div class="sr-name">${escXml(name)}</div>
      ${parts ? `<div class="sr-sub">${escXml(parts)}</div>` : ''}
    </div>`;
  }).join('');
  searchResults.classList.add('show');

  searchResults.querySelectorAll('.search-result').forEach((el, i) => {
    el.addEventListener('click', () => {
      const r   = results[i];
      const lon = parseFloat(r.lon), lat = parseFloat(r.lat);
      map.flyTo({ center: [lon, lat], zoom: 14, duration: 900 });
      if (searchMarker) searchMarker.remove();
      const dot = document.createElement('div'); dot.className = 'search-pin';
      searchMarker = new maplibregl.Marker({ element: dot }).setLngLat([lon, lat]).addTo(map);
      searchResults.innerHTML = ''; searchResults.classList.remove('show');
      searchInput.value = r.name || r.display_name.split(',')[0].trim();
    });
  });
}

function storageKey() { return `gpx_tracks_${(currentUser || 'default').toLowerCase()}`; }

// ── Geo helpers ────────────────────────────────────────────────────────────
function haversine(a, b) {
  const R = 6371000, r = d => d * Math.PI / 180;
  const dLat = r(b.lat - a.lat), dLon = r(b.lon - a.lon);
  const s = Math.sin(dLat/2)**2 + Math.cos(r(a.lat)) * Math.cos(r(b.lat)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(s));
}
function fmtDuration(ms) {
  const s = Math.floor(ms/1000), m = Math.floor(s/60), h = Math.floor(m/60);
  return h > 0
    ? `${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function fmtPace(ms, distM) {
  if (!distM) return '—';
  const msPerKm = ms / (distM / 1000);
  return `${Math.floor(msPerKm/60000)}:${String(Math.floor((msPerKm%60000)/1000)).padStart(2,'0')}`;
}
function fmtAlt(v) { return v != null ? Math.round(v) + ' m' : '—'; }
function defaultTitle() {
  return `Traccia ${new Date().toLocaleDateString('it-IT')} ${new Date().toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' })}`;
}

// ── Elevation stats ────────────────────────────────────────────────────────
function altStats(pts) {
  const p = pts.filter(p => p.ele != null && !isNaN(p.ele));
  if (!p.length) return null;
  const alts = p.map(x => x.ele);
  return { start: p[0].ele, end: p[p.length-1].ele, max: Math.max(...alts), min: Math.min(...alts), pts: p };
}

function elevGain(pts) {
  const p = (pts || []).filter(p => p.ele != null && !isNaN(p.ele));
  let gain = 0, loss = 0;
  for (let i = 1; i < p.length; i++) {
    const d = p[i].ele - p[i-1].ele;
    if (d > 0.5)  gain += d;
    else if (d < -0.5) loss -= d;
  }
  return { gain: Math.round(gain), loss: Math.round(loss) };
}

// ── Altitude chart SVG ─────────────────────────────────────────────────────
function buildAltitudeChart(pts) {
  const as = altStats(pts);
  if (!as || as.pts.length < 2)
    return '<p style="color:var(--muted);font-size:.78rem;text-align:center;padding:18px 0">Dati altitudine non disponibili</p>';

  const W = 320, H = 110, pL = 46, pR = 10, pT = 14, pB = 22;
  const cW = W - pL - pR, cH = H - pT - pB;
  const range = as.max - as.min || 1;

  const cum = [0];
  for (let i = 1; i < as.pts.length; i++) cum.push(cum[i-1] + haversine(as.pts[i-1], as.pts[i]));
  const totD = cum[cum.length-1] || 1;

  const toX = d => pL + (d / totD) * cW;
  const toY = a => pT + cH - ((a - as.min) / range) * cH;
  const coords = as.pts.map((p, i) => ({ x: toX(cum[i]), y: toY(p.ele) }));
  const line = coords.map((c, i) => `${i ? 'L' : 'M'}${c.x.toFixed(1)},${c.y.toFixed(1)}`).join('');
  const fill = `${line}L${coords[coords.length-1].x.toFixed(1)},${H-pB}L${pL},${H-pB}Z`;
  const maxIdx = as.pts.findIndex(p => p.ele === as.max);
  const mxPt  = coords[maxIdx];
  const mid   = (as.min + as.max) / 2;

  const grid = [as.min, mid, as.max].map(a => {
    const y = toY(a).toFixed(1);
    return `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#2a2d3a" stroke-width="1"/>
            <text x="${pL-4}" y="${(+y+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#64748b">${Math.round(a)}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
    <defs>
      <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4ade80" stop-opacity=".35"/>
        <stop offset="100%" stop-color="#4ade80" stop-opacity=".02"/>
      </linearGradient>
    </defs>
    ${grid}
    <path d="${fill}" fill="url(#ag)"/>
    <path d="${line}" stroke="#4ade80" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${coords[0].x.toFixed(1)}" cy="${coords[0].y.toFixed(1)}" r="4" fill="#4ade80"/>
    <circle cx="${coords[coords.length-1].x.toFixed(1)}" cy="${coords[coords.length-1].y.toFixed(1)}" r="4" fill="#60a5fa"/>
    ${maxIdx > 0 && maxIdx < as.pts.length-1 ? `<circle cx="${mxPt.x.toFixed(1)}" cy="${mxPt.y.toFixed(1)}" r="4" fill="#fbbf24"/>` : ''}
    <text x="${pL}" y="${H-4}" text-anchor="start" font-size="9" fill="#64748b">0 km</text>
    <text x="${W-pR}" y="${H-4}" text-anchor="end" font-size="9" fill="#64748b">${(totD/1000).toFixed(2)} km</text>
    <text x="${pL-2}" y="${pT-2}" text-anchor="end" font-size="8" fill="#64748b">m slm</text>
  </svg>`;
}

// ── GPX export ─────────────────────────────────────────────────────────────
function buildGpx(pts, title, author) {
  const trkpts = pts.map(p =>
    `      <trkpt lat="${p.lat.toFixed(7)}" lon="${p.lon.toFixed(7)}">\n` +
    (p.ele != null ? `        <ele>${p.ele.toFixed(1)}</ele>\n` : '') +
    `        <time>${new Date(p.time).toISOString()}</time>\n      </trkpt>`
  ).join('\n');
  const aBlock = author ? `    <author><name>${escXml(author)}</name></author>\n` : '';
  return `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="GPS Tracker Web" xmlns="http://www.topografix.com/GPX/1/1">\n  <metadata>\n    <name>${escXml(title)}</name>\n${aBlock}    <time>${new Date().toISOString()}</time>\n  </metadata>\n  <trk>\n    <name>${escXml(title)}</name>\n    <trkseg>\n${trkpts}\n    </trkseg>\n  </trk>\n</gpx>`;
}

function escXml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function downloadGpx(pts, title, author) {
  const blob = new Blob([buildGpx(pts, title, author||'')], { type:'application/gpx+xml' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `${title.replace(/[/\\?%*:|"<>]/g,'-')}.gpx`
  });
  a.click(); URL.revokeObjectURL(a.href);
}

// ── GPX import ─────────────────────────────────────────────────────────────
function importGpx(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const doc = new DOMParser().parseFromString(e.target.result, 'text/xml');
      if (doc.querySelector('parsererror')) throw new Error('XML non valido');
      const nameEl = doc.querySelector('trk > name') || doc.querySelector('metadata > name');
      const title  = nameEl?.textContent?.trim() || file.name.replace(/\.gpx$/i, '');
      const trkpts = Array.from(doc.querySelectorAll('trkpt'));
      if (!trkpts.length) throw new Error('Nessun punto trovato');
      const pts = trkpts.map(pt => ({
        lat:  parseFloat(pt.getAttribute('lat')),
        lon:  parseFloat(pt.getAttribute('lon')),
        ele:  pt.querySelector('ele')  ? parseFloat(pt.querySelector('ele').textContent)  : null,
        time: pt.querySelector('time') ? new Date(pt.querySelector('time').textContent).getTime() : Date.now()
      })).filter(p => !isNaN(p.lat) && !isNaN(p.lon));
      if (pts.length < 2) throw new Error('Traccia troppo corta');
      let dist = 0;
      for (let i = 1; i < pts.length; i++) dist += haversine(pts[i-1], pts[i]);
      const duration = Math.max(pts[pts.length-1].time - pts[0].time, 1000);
      const tracks = loadTracks();
      tracks.unshift({ points: pts, title, author: currentUser || '', dist, duration, date: pts[0].time });
      saveTracks(tracks);
      updateTracksCount();
      if (showingAllTracks) drawAutoGhosts();
      toast(`"${title}" importata — ${(dist/1000).toFixed(2)} km`);
    } catch(err) { toast('Errore: ' + err.message); }
  };
  reader.readAsText(file);
}

document.getElementById('btn-import').addEventListener('click', () => gpxFileInput.click());
gpxFileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) { importGpx(file); gpxFileInput.value = ''; }
});

function setUIState(s) {
  const dot = document.getElementById('status-dot');
  dot.className = '';
  hide('btn-start'); hide('btn-pause'); hide('btn-stop');
  show('btn-export'); show('tracks-btn');
  if (s === STATE.IDLE) {
    document.getElementById('btn-start').textContent = '▶ Avvia';
    show('btn-start');
    document.getElementById('btn-export').disabled = loadTracks().length === 0;
  } else if (s === STATE.RECORDING) {
    show('btn-pause'); show('btn-stop');
    hide('btn-export'); hide('tracks-btn');
    dot.classList.add('recording');
  } else if (s === STATE.PAUSED) {
    document.getElementById('btn-start').textContent = '▶ Riprendi';
    show('btn-start'); show('btn-stop');
    hide('btn-export'); hide('tracks-btn');
    dot.classList.add('paused');
  }
}
function updateTracksCount() {
  document.getElementById('tracks-count').textContent = loadTracks().length;
}

// ── Aggregate stats ────────────────────────────────────────────────────────
function renderAggStats() {
  const tracks   = loadTracks();
  const totalKm  = tracks.reduce((s, t) => s + (t.dist || 0), 0) / 1000;
  const totalGain = tracks.reduce((s, t) => s + elevGain(t.points || []).gain, 0);
  document.getElementById('panel-agg').innerHTML = `
    <div class="agg-stat">
      <div class="agg-val">${tracks.length}</div>
      <div class="agg-lbl">Tracce</div>
    </div>
    <div class="agg-stat">
      <div class="agg-val" style="color:var(--accent)">${totalKm.toFixed(1)} km</div>
      <div class="agg-lbl">Totale km</div>
    </div>
    <div class="agg-stat">
      <div class="agg-val" style="color:var(--warn)">${totalGain > 0 ? '+' + totalGain + ' m' : '—'}</div>
      <div class="agg-lbl">D+ totale</div>
    </div>`;
}

// ── Save dialog ────────────────────────────────────────────────────────────
function showSaveDialog(track) {
  pendingTrack = track;
  document.getElementById('inp-title').value  = defaultTitle();
  document.getElementById('inp-author').value = currentUser || '';
  document.getElementById('save-stats-hint').textContent =
    `· ${(track.dist/1000).toFixed(2)} km · ${fmtDuration(track.duration)}`;
  document.getElementById('save-overlay').classList.add('open');
  document.getElementById('inp-title').focus();
  document.getElementById('inp-title').select();
}
function closeSaveDialog() {
  document.getElementById('save-overlay').classList.remove('open');
  pendingTrack = null;
}

document.getElementById('btn-save-confirm').addEventListener('click', () => {
  if (!pendingTrack) return;
  const title  = document.getElementById('inp-title').value.trim() || defaultTitle();
  const tracks = loadTracks();
  tracks.unshift({ ...pendingTrack, title, author: currentUser || '' });
  saveTracks(tracks);
  updateTracksCount();
  if (showingAllTracks) drawAutoGhosts();
  closeSaveDialog();
  document.getElementById('btn-export').disabled = false;
  setUIState(STATE.IDLE);
  toast(`"${title}" salvata — ${(pendingTrack.dist/1000).toFixed(2)} km`);
});

document.getElementById('btn-save-discard').addEventListener('click', () => {
  closeSaveDialog(); setUIState(STATE.IDLE); toast('Traccia scartata');
});

// ── Geolocation ────────────────────────────────────────────────────────────
function startWatch() {
  if (watchId !== null) return;
  watchId = navigator.geolocation.watchPosition(onPosition, onGeoError, {
    enableHighAccuracy: true, maximumAge: 2000, timeout: 10000
  });
}
function stopWatch() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
}

function onPosition(pos) {
  const { latitude: lat, longitude: lon, altitude: ele, accuracy, speed } = pos.coords;
  const time = pos.timestamp;
  const badge = document.getElementById('gps-badge');
  badge.textContent = `±${Math.round(accuracy)}m`;
  badge.className   = accuracy < 20 ? 'good' : '';
  if (speed != null) currentSpeed = speed * 3.6;
  if (!posMarker) {
    const el = document.createElement('div'); el.className = 'pos-dot';
    posMarker = new maplibregl.Marker({ element: el }).setLngLat([lon, lat]).addTo(map);
  } else { posMarker.setLngLat([lon, lat]); }
  if (!centered) { map.jumpTo({ center: [lon, lat], zoom: 16 }); centered = true; }
  document.getElementById('status-dot').classList.add('ready');
  if (state !== STATE.RECORDING) return;
  const pt = { lat, lon, ele, time };
  points.push(pt);
  if (lastPos) {
    const d = haversine(lastPos, pt);
    totalDist += d;
    if (speed == null) { const dt = (time - lastPos.time) / 1000; if (dt > 0) currentSpeed = (d / dt) * 3.6; }
  }
  lastPos = pt;
  updateTrackOnMap(); updateStats();
}

function onGeoError(err) {
  const msgs = { 1: 'Accesso GPS negato', 2: 'Posizione non disponibile', 3: 'Timeout GPS' };
  toast(msgs[err.code] || 'Errore GPS');
}

// ── Recording controls ─────────────────────────────────────────────────────
function startRecording() {
  if (state === STATE.IDLE) {
    points = []; totalDist = 0; currentSpeed = 0; lastPos = null;
    startTime = Date.now(); pausedMs = 0;
    clearTrackOnMap();
    document.getElementById('s-time').textContent = '00:00';
    updateStats();
  } else if (state === STATE.PAUSED) {
    pausedMs += Date.now() - pauseStart;
  }
  state = STATE.RECORDING;
  startWatch();
  timerInterval = setInterval(updateTimer, 1000);
  setUIState(STATE.RECORDING);
}

function pauseRecording() {
  if (state !== STATE.RECORDING) return;
  state = STATE.PAUSED; pauseStart = Date.now();
  clearInterval(timerInterval); setUIState(STATE.PAUSED);
}

function stopRecording() {
  if (state === STATE.IDLE) return;
  clearInterval(timerInterval); state = STATE.IDLE; stopWatch();
  if (points.length < 2) { toast('Traccia troppo corta, non salvata'); setUIState(STATE.IDLE); return; }
  showSaveDialog({ points, dist: totalDist, duration: Date.now() - startTime - pausedMs, date: Date.now() });
}

// ── Export ─────────────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  const tracks = loadTracks(); if (!tracks.length) return;
  const t = tracks[0]; downloadGpx(t.points, t.title || 'traccia', t.author);
});

// ── Buttons ────────────────────────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', startRecording);
document.getElementById('btn-pause').addEventListener('click', pauseRecording);
document.getElementById('btn-stop').addEventListener('click', stopRecording);
document.getElementById('btn-center').addEventListener('click', () => {
  if (posMarker) map.easeTo({ center: posMarker.getLngLat(), zoom: Math.max(map.getZoom(), 16), duration: 400 });
  else toast('Posizione non ancora disponibile');
});

// ── Tracks list ────────────────────────────────────────────────────────────
function renderTracksList() {
  const list = document.getElementById('tracks-list');
  document.getElementById('panel-title').textContent = `Tracce di ${currentUser}`;
  const btn = document.getElementById('panel-map-btn');
  btn.textContent = showingAllTracks ? '🗺 Nascondi' : '🗺 Mappa';
  btn.classList.toggle('active', showingAllTracks);
  renderAggStats();
  const tracks = loadTracks();
  if (!tracks.length) {
    list.innerHTML = '<p class="empty-msg">Nessuna traccia salvata.<br>Premi Avvia per registrare o 📂 per importare un GPX.</p>';
    return;
  }
  list.innerHTML = tracks.map((t, i) => {
    const eg   = elevGain(t.points || []);
    const date = t.date ? new Date(t.date).toLocaleDateString('it-IT', { day:'2-digit', month:'short', year:'numeric' }) : '';
    const elev = eg.gain ? ` · ↑${eg.gain}m` : '';
    return `
    <div class="track-item" data-i="${i}">
      <div class="track-info" data-action="detail" data-i="${i}" style="flex:1;min-width:0">
        <div class="track-title">${escXml(t.title || 'Traccia')}</div>
        <div class="track-summary">${(t.dist/1000).toFixed(2)} km · ${fmtDuration(t.duration)} · ${fmtPace(t.duration,t.dist)} /km${elev}${date ? ' · '+date : ''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <div class="track-chevron">›</div>
        <div class="track-actions">
          <button class="btn-share" data-action="share" data-i="${i}">⬆</button>
          <button class="btn-dl"    data-action="dl"    data-i="${i}">↓</button>
          <button class="btn-rm"    data-action="rm"    data-i="${i}">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('tracks-btn').addEventListener('click', () => {
  renderTracksList();
  document.getElementById('overlay').classList.add('open');
});
document.getElementById('panel-close').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('open');
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
});

document.getElementById('tracks-list').addEventListener('click', e => {
  const el = e.target.closest('[data-action]'); if (!el) return;
  const { action, i } = el.dataset;
  const idx    = parseInt(i);
  const tracks = loadTracks();
  const t      = tracks[idx];
  if (action === 'detail') {
    document.getElementById('overlay').classList.remove('open');
    showTrackDetail(idx);
  } else if (action === 'share') {
    shareTrack(t);
  } else if (action === 'dl') {
    downloadGpx(t.points, t.title || 'traccia', t.author);
  } else if (action === 'rm') {
    if (!confirm(`Eliminare "${t.title || 'questa traccia'}"?`)) return;
    tracks.splice(idx, 1); saveTracks(tracks);
    updateTracksCount(); renderTracksList();
    if (showingAllTracks) drawAutoGhosts();
    toast('Traccia eliminata');
  }
});

// ── Share ──────────────────────────────────────────────────────────────────
async function shareTrack(t) {
  const title = t.title || 'Traccia GPS';
  const file  = new File([buildGpx(t.points, title, t.author||'')],
    title.replace(/[/\\?%*:|"<>]/g,'-') + '.gpx', { type:'application/gpx+xml' });
  const text = [t.author ? `Di: ${t.author}` : '', `${(t.dist/1000).toFixed(2)} km · ${fmtDuration(t.duration)}`].filter(Boolean).join('\n');
  try {
    if (navigator.canShare && navigator.canShare({ files:[file] })) await navigator.share({ title, text, files:[file] });
    else if (navigator.share) { await navigator.share({ title, text }); toast('File non condivisibile, usa ↓'); }
    else { downloadGpx(t.points, title, t.author); toast('Condivisione non supportata — file scaricato'); }
  } catch(e) { if (e.name !== 'AbortError') toast('Errore condivisione'); }
}

// ── Init ───────────────────────────────────────────────────────────────────
if (currentUser) login(currentUser);
else document.getElementById('login-screen').classList.remove('hidden');
</script>
